name: Atualizar notícias

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/atualizar-noticias.js
      - name: Commit se mudou
        run: |
          git config user.name "onscreen-bot"
          git config user.email "actions@github.com"
          git add noticias.json noticias-*.json
          git diff --cached --quiet || git commit -m "atualiza noticias"
          git push
